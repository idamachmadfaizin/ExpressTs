tags:
  - name: auth
    description: Authentication API

paths:
  # [POST] Register
  /auth/register:
    post:
      tags:
        - auth
      summary: Register
      description: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/definitions/user'

      responses:
        200:
          description: OK
        401:
          description: Unauthorized

# definitions
definitions:
  user:
    type: object
    required:
      - name
      - email
      - password
      - confirmPassword
    properties:
      name:
        type: string
        description: User name
        example: first
      email:
        type: string
        description: User Email
        example: first@mail.com
      password:
        type: string
        description: User Password
        example: password
      confirmPassword:
        type: string
        description: User confirm Password
        example: password
